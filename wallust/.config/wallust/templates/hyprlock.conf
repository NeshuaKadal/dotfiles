$font = JetBrainsMono Nerd Font
$font2 = Playfair Display

general {
    hide_cursor = true
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
}

input-field {
    monitor =
    size = 600px, 40px
    outline_thickness = -1
    inner_color = rgba(0,0,0,0)

    outer_color = rgba(0,0,0,0)
    check_color = rgba({{foreground | darken(0.5) | rgb}},0.85)
    fail_color = rgb({{color5 | rgb}})
    fade_on_empty = false
    rounding = 0

    font_family = $font
    placeholder_text =
    fail_text = INCORRECT

    # check_text = Authenticating...

    font_color = rgb({{foreground | rgb}})
    dots_size = 0.25
    dots_spacing = 0.75
    # dots_center = false

    position = 0, 0
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    text_align = left
    color = rgb({{foreground | rgb}})
    font_size = 100
    font_family = $font2

    position = 5%, -5%
    halign = left
    valign = top
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    text_align = left
    color = rgb({{foreground | rgb}})
    font_size = 10
    font_family = $font

    position = 5%, -18%
    halign = left
    valign = top
}
